<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    canvas { 
        border:1px solid black;
    }
    img {
        display: none;
    }
</style>
</head>

<body onload="start()">  
    <canvas id="game" width="900" height="600"></canvas>
    <script>
        document.addEventListener("keydown", handleKeyDown);
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");

        let boxBirdX = 200;
        let boxBirdY = 160;
        
        let vy = 0;
        let gravity = 0.3;
        let isGravity = true;
        let pipeSpeed = 3;
        
        let whiteBoardX = 600;
        let pipeSpacing = 350;
        let pipeAx = whiteBoardX +5;
        let pipeBx = whiteBoardX + pipeSpacing;
        let pipeBwidth; 
        let pipeAwidth;
        let holeAposY;
        let holeBposY;
        let holeSize = 150;

        let collisionA = false;
        let collisionB = false;

        let scorePipeA = false;
        let scorePipeB = false;
        
        let score = 0;
        let birds = 3;
        let xBirds = 0;
        let validA = false;
        let validB = false;

        let isPaused = false;
        let isGameOver = false;
        let iRunning = true;
        let isReset = false;
        let seconds = -1;
        let isFirstGame = true;

        function start() {
            gameLoop();
        }

        function newGame(isCounting) {
            if (isFirstGame) {
                isRunning = false;
            }
        }

        function reStart() {
            boxBirdY = 160;
            isGravity = true;
            isRunning = true;
            isPaused = false;
            isReset = false;
        }
        
        function reset() {
            pipeAx = whiteBoardX +5;
            pipeBx = whiteBoardX + pipeSpacing;
            pipeSpeed = 3;
            collisionA = false;
            collisionB = false;
            scorePipeA = false;
            scorePipeB = false;
            isGameOver = false;
            isRunning = false;
            isPaused = false;
            isReset = true;
            isFirstGame = false;
            xBirds = 0;
            score = 0;
        }

        function handleKeyDown(e) {
            if (e.code == "Space") {
                if (isRunning) {
                    if (!isGameOver) {
                        vy = -4;
                    }
                }
            }
            if(e.code == "KeyP") {
                if (!isFirstGame) {
                    if (isRunning) {
                        if (!isGameOver) {
                            if (!isPaused) {
                                pipeSpeed = 0;
                                isPaused = true;
                                isGravity = false;
                            } else if (isPaused) {
                                pipeSpeed = 3;
                                isPaused = false;
                                isGravity = true;
                            }
                        }
                    }
                }
                if (isFirstGame) {
                    timer(4000);
                    reset();
                }
            }
            if (e.code == "KeyR") {
                if (!isReset) {
                    timer(4000)
                    reset();
                }
            }
            if (e.code == "NumpadAdd") {
                if (isRunning) {
                    pipeSpeed += 0.25;
                }
            }
            if (e.code == "NumpadSubtract") {
                if (isRunning) {
                    if (pipeSpeed > 0.25) {
                        pipeSpeed -= 0.25;
                    }
                }
            }
            if (e.code == "ArrowUp") {
                if (isPaused) {
                    if (boxBirdY >= 0) {
                        boxBirdY -= 10;
                    }
                }
            }
            if (e.code == "ArrowDown") {
                if (isPaused) {
                    if (boxBirdY <= c.height -40) {
                        boxBirdY += 10;
                    }
                }
            }
        }

        function enableGravity() {
            vy += gravity;
            boxBirdY += vy;
            if (boxBirdY > c.height - 40) {
                boxBirdY = c.height - 40;
                vy = -vy * 0.65;
            }
        }

        function timer(duration) {
            let endTime = Date.now() + duration;
            let timer = setInterval(() => {
                let timeLeft = endTime - Date.now();
                seconds = Math.floor(timeLeft / 1000);
                if (timeLeft <= 0) {
                    clearInterval(timer);
                }
            }, 100);
        }
                
        function getRand(pipePosX,i,min,max) {
            if (pipePosX >= whiteBoardX) {
                min = Math.ceil(min);
                max = Math.floor(max);
                i = Math.floor(Math.random() * (((max - min) / 2) +1)) * 2 + min;
                return(i);
            } else {
                return(i);
            }
        }
        
        function boxBird(birdX, birdY, birdSizeX, birdSizeY, color) {
            if (!isFirstGame) {
                if (!isReset) {
                    ctx.fillStyle = color;
                    ctx.fillRect(birdX, birdY, birdSizeX, birdSizeY);
                }
            }
        }

        function absolutePipePos(pipePosX,pipeWidth) {
            if (pipePosX > -100) {
                    pipePosX -= pipeSpeed;
                } else if (pipePosX <= -100) {
                    pipePosX = whiteBoardX;
                }
            return(pipePosX);
        }
        
        function pipePair(pipePosX,holeSize,holePosY,width) {
            let topPipeL = holePosY;
            let bottomPipeL = c.height - topPipeL - holeSize;
            let bottomPipeY = topPipeL + holeSize;

            ctx.fillStyle = "black"
            ctx.fillRect(pipePosX,0,width,topPipeL);
            ctx.fillRect(pipePosX,bottomPipeY,width,bottomPipeL);
        }

        function detectCollision(birdX,birdY,pipeX,pipeWidth,holePos,isCollision) {
            if (birdX + 40 >= pipeX && birdX <= pipeX + pipeWidth) {
                if (birdY <= holePos || birdY +40 >= holePos+holeSize) {
                    isCollision = true;
                }
            } else if (pipeX >= whiteBoardX) {
                isCollision = false;
            }
            return(isCollision);
        }
        
        function detectScore(pipeX,pipeWidth,isCollision,isScore) {
            if (!isCollision && !isScore && boxBirdX >= pipeX + pipeWidth) {
                isScore = true;
                score += 5;
            } else if (isScore && pipeX >= whiteBoardX) {
                isScore = false;
            }
            return(isScore);
        }
        
        function whiteBoard(isCounting) {
            ctx.fillStyle = "white"
            ctx.fillRect(whiteBoardX, -0.5, 301, c.height+1);
            ctx.lineWidth = 1;
            ctx.strokeStyle = "black"
            ctx.strokeRect(whiteBoardX , -0.5, 301, c.height+1);
            drawText(whiteBoardX + 15, 50, 40, "black", "BoxBird v0.1");
            drawText(whiteBoardX + 15, 110, 20,"black", "Evade the haunting pillars...");
            drawText(whiteBoardX + 100, 135, 20, "black","- or loose it all.");
            drawText(whiteBoardX + 15, c.height - 150, 13, "black","press <space> to flutter");
            drawText(whiteBoardX + 15, c.height - 130, 13, "black","press <+/-> to speed up/down");
            drawText(whiteBoardX + 15, c.height - 110, 13, "black","press <up/down> to move bird up/down");
            drawText(whiteBoardX + 15, c.height - 90, 13, "black","press <p> to pause");
            drawText(whiteBoardX + 15, c.height - 70, 13, "black","press <r> to reset");
            drawText(whiteBoardX + 15, c.height - 20, 20, "black", "Score:  " + score);
            if (isFirstGame) {
                if (!isReset) {
                    drawText(whiteBoardX -510, c.height -400, 50, "black", "Press <p> to start.");
                }
            }
            if (isReset) {
                if (isCounting >= 1) {
                    drawText(whiteBoardX + 100, 300, 150, "black", isCounting);
                }
            }
            if(isGameOver) {
                drawText(whiteBoardX + 15, 300, 50, "black", "GameOver");
            }
            if (isPaused) {
                drawText(whiteBoardX + 50, 300, 75, "black", "pause");
            }
            boxBirds();
        }
        
        function boxBirds() {
            let i = birds;
            let n = xBirds;
            let spacing = -45;
            let xSpacing = -45;
            
            while (i > 0) {
                boxBird(c.width + spacing, c.height -45, 30, 30);
                i--;
                spacing -= 45;
            }
            while (n > 0) {
                drawText(c.width + xSpacing, c.height -18, 40, "red", "X");
                n--;
                xSpacing -= 45;
            } 
        }
        
        function boxedBirds(isCollision,valid) {
            if (!isCollision) {
                valid = true;
            } 
            if (isCollision && valid ) {
                xBirds++;
                valid = false;
            }
            if(xBirds == birds) {
               isGameOver = true;
            }
            return valid;
        }

        function drawText(x, y, fontSize, color, text) {
            ctx.fillStyle = color;
            ctx.font = fontSize + "px Copperplate, Papyrus, Fantasy";
            ctx.fillText(text, x, y);
        }

        function update() {
            if (isRunning) {
                pipeAx = absolutePipePos(pipeAx,pipeAwidth);
                pipeBx = absolutePipePos(pipeBx,pipeBwidth);
                pipeAwidth = getRand(pipeAx,pipeAwidth,20,100);
                pipeBwidth = getRand(pipeBx,pipeBwidth,20,100);
                holeAposY = getRand(pipeAx,holeAposY,50,400);
                holeBposY = getRand(pipeBx,holeBposY,50,400);
                collisionA = detectCollision(boxBirdX,boxBirdY,pipeAx,pipeAwidth,holeAposY,collisionA);
                collisionB = detectCollision(boxBirdX,boxBirdY,pipeBx,pipeBwidth,holeBposY,collisionB);
                scorePipeA = detectScore(pipeAx,pipeAwidth,collisionA,scorePipeA);
                scorePipeB = detectScore(pipeBx,pipeBwidth,collisionB,scorePipeB);
                if(xBirds < birds) {
                    validA = boxedBirds(collisionA,validA);
                    validB = boxedBirds(collisionB,validB);
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0,0,c.width,c.height);
            boxBird(boxBirdX,boxBirdY, 40, 40, "black");
            pipePair(pipeAx,holeSize,holeAposY,pipeAwidth); // posX,holeSize,holePosY
            pipePair(pipeBx,holeSize,holeBposY,pipeBwidth); // posX,holeSize,holePosY
            whiteBoard(seconds);
        }

        function gameLoop() {
            newGame();
            if (isGravity) {
                enableGravity();
            }
            if (isReset) {
                if (seconds == 0) {
                    reStart();
                }
            }
            update();
            draw();
            console.log(seconds)
            requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
