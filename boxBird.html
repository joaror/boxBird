<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    canvas { 
        border:1px solid black;
    }
    img {
        display: none;
    }
</style>
</head>

<body onload="start()"></body>  
    <canvas id="game" width="900" height="600"></canvas>
    <script>
        document.addEventListener("keydown", handleKeyDown);
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");

        const pipes = {
            pipeA:[0,0,0,0,0,0], // pipePos, holePos, pipeWidth, spacing, isCollision, isScore
            pipeB:[0,0,0,0,0,0],
            pipeC:[0,0,0,0,0,0],
            minMax:[20,100,50,400,200,350] // minWidth, maxWidth, holePosMin, holePosMax, spacingMin, spacingMax
        }

        const gameStat = {
//            states: [1,0,0,0,0], // isFirstGame, isRunning, isPaused, isGameOver, isReset
            stat:[3,0,0] // birds, Xbirds, gameScore
        }

        let trailingPipe = "pipeC"
        
        let boxBirdX = 200;
        let boxBirdY = 160;
        
        let vy = 0;
        let gravity = 0.3;
        let pipeSpeed = 3;
        
        let whiteBoardX = 600;
        let holeSize = 150;
        
        let isPaused = false;
        let isGameOver = false;
        let isRunning = false;
        let isReset = false;
        let seconds = -1;
        let isFirstGame = true;

        function start() {
            gameLoop();
        }
        
        function reStart() {
            if (isReset && seconds == 0) {
                seconds = -1;
                boxBirdY = 160;
                isRunning = true;
                isReset = false;
            }
        }
        
        function reset() {
            pipeSpeed = 3;
            vy = 0;

            pipes.pipeA = [0,0,0,0,0,0]
            pipes.pipeB = [0,0,0,0,0,0]
            pipes.pipeC = [0,0,0,0,0,0]

            gameStat.stat = [3,0,0]
            
            isGameOver = false;
            isRunning = false;
            isReset = true;
            isPaused = false;
            isFirstGame = false;
        }
        
        function handleKeyDown(e) {
            if (e.code == "Space") {
                if (isRunning && !isGameOver) {
                    vy = -4;
                }
            }
            if(e.code == "KeyP") {
                if (isFirstGame) {
                    timer(3000);
                    reset();
                } else if (isRunning && !isPaused &&  !isGameOver && seconds == -1) {
                    isPaused = true;
                    isRunning = false;
                } else if (isPaused) {
                    isRunning = true;
                    isPaused = false;
                }
            }
            if (e.code == "KeyR") {
                if (!isReset && !isFirstGame) {
                    timer(3000)
                    reset();
                }
            }
            if (e.code == "NumpadAdd") {
                if (isRunning && !isGameOver) {
                    pipeSpeed += 0.25;
                }
            }
            if (e.code == "NumpadSubtract") {
                if (isRunning && !isGameOver && pipeSpeed > 0.25) {
                    pipeSpeed -= 0.25;
                }
            }
            if (e.code == "ArrowUp") {
                if (isPaused && boxBirdY >= 0) {
                    boxBirdY -= 10;
                }
            }
            if (e.code == "ArrowDown") {
                if (isPaused && boxBirdY <= c.height -40) {
                    boxBirdY += 10;
                }
            }
        }
        
        function enableGravity() {
            vy += gravity;
            boxBirdY += vy;
            if (boxBirdY > c.height - 40) {
                boxBirdY = c.height - 40;
                vy = -vy * 0.65;
            }
        }
        
        function timer(duration) {
            let endTime = Date.now() + duration;
            let timer = setInterval(() => {
                let timeLeft = endTime - Date.now();
                seconds = (timeLeft / 1000);
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    seconds = 0;
                }
            }, 1);
        }
        
        function pipeUpdater(iD) {
            if (pipes[trailingPipe][0]+pipes[trailingPipe][2]+pipes[trailingPipe][3] >= whiteBoardX) {
                pipes[iD][0] -= pipeSpeed;
            } else {
                pipes[iD][0] = whiteBoardX;
                pipes[iD][1] = Math.floor(Math.random() * (((pipes.minMax[3] - pipes.minMax[2]) / 2) +1)) * 2 + pipes.minMax[2];
                pipes[iD][2] = Math.floor(Math.random() * (((pipes.minMax[1] - pipes.minMax[0]) / 2) +1)) * 2 + pipes.minMax[0];
                pipes[iD][3] = Math.floor(Math.random() * (((pipes.minMax[5] - pipes.minMax[4]) / 2) +1)) * 2 + pipes.minMax[4];
                trailingPipe = iD;
            }
        }
        
        function pipePair(holeSize,iD) {
            let topPipeL = pipes[iD][1];
            let bottomPipeL = c.height - topPipeL - holeSize;
            let bottomPipeY = topPipeL + holeSize;
            
            ctx.fillStyle = "black"
            ctx.fillRect(pipes[iD][0],0,pipes[iD][2],topPipeL);
            ctx.fillRect(pipes[iD][0],bottomPipeY,pipes[iD][2],bottomPipeL);
        }
        
        function detectCollision(birdX,birdY,iD) {
            if (!isGameOver && pipes[iD][4] == 0 && birdX + 40 >= pipes[iD][0] && birdX <= pipes[iD][0] + pipes[iD][2]) {
                if (birdY <= pipes[iD][1] || birdY +40 >= pipes[iD][1] +holeSize) {
                    pipes[iD][4] = 1
                    gameStat.stat[1]++
                }
            }
            if (pipes[iD][0] <- pipes[iD][2]) {
                pipes[iD][4] = 0;
            }
            if(gameStat.stat[1] == gameStat.stat[0]) {
                isGameOver = true;
            }
        }
        
        function detectScore(iD) {
            if (boxBirdX >= pipes[iD][0] + pipes[iD][2] && pipes[iD][0] >= 0 && !isGameOver && pipes[iD][4] == 0 && pipes[iD][5] == 0) {
                pipes[iD][5] = 1;
                gameStat.stat[2] += 5;
            } else if (pipes[iD][5] == 1 && pipes[iD][0] < -pipes[iD][2]) {
                pipes[iD][5] = 0;
            }
        }
            
        function boxBird(birdX, birdY, birdSizeX, birdSizeY, color) {
            ctx.fillStyle = color;
            ctx.fillRect(birdX, birdY, birdSizeX, birdSizeY);
        }
            
        function drawBoxBirds() {
            let i = gameStat.stat[0];
            let n = gameStat.stat[1];
            let spacing = -45;
            let xSpacing = -45;
            
            while (i > 0) {
                boxBird(c.width + spacing, c.height -45, 30, 30);
                i--;
                spacing -= 45;
            }
            while (n > 0) {
                drawText(c.width + xSpacing, c.height -18, 40, "red", "X");
                n--;
                xSpacing -= 45;
            } 
        }

        function drawText(x, y, fontSize, color, text) {
            ctx.fillStyle = color;
            ctx.font = fontSize + "px Copperplate, Papyrus, Fantasy";
            ctx.fillText(text, x, y);
        }
        
        function whiteBoard() {
            ctx.fillStyle = "white"
            ctx.fillRect(whiteBoardX, -0.5, 301, c.height+1);
            ctx.lineWidth = 1;
            ctx.strokeStyle = "black"
            ctx.strokeRect(whiteBoardX , -0.5, 301, c.height+1);
            drawText(whiteBoardX + 15, 50, 40, "black", "BoxBird v0.1");
            drawText(whiteBoardX + 15, 110, 20,"black", "Evade the haunting pillars...");
            drawText(whiteBoardX + 100, 135, 20, "black","- or loose it all.");
            drawText(whiteBoardX + 15, c.height - 150, 13, "black","press <space> to flutter");
            drawText(whiteBoardX + 15, c.height - 130, 13, "black","press <+/-> to speed up/down");
            drawText(whiteBoardX + 15, c.height - 110, 13, "black","press <up/down> to move bird up/down");
            drawText(whiteBoardX + 15, c.height - 90, 13, "black","press <p> to pause");
            drawText(whiteBoardX + 15, c.height - 70, 13, "black","press <r> to reset");
            drawText(whiteBoardX + 15, c.height - 20, 20, "black", "Score:  " + gameStat.stat[2] );
            if (isFirstGame) {
                drawText(whiteBoardX -510, c.height -400, 50, "black", "Press <p> to start.");
            }
            if (seconds > 0) {
                drawText(whiteBoardX + 100, 300, 150, "black", Math.floor(seconds)+1);
            }
            if(isGameOver) {
                drawText(whiteBoardX + 15, 300, 50, "black", "GameOver");
            }
            if (isPaused) {
                drawText(whiteBoardX + 50, 300, 75, "black", "pause");
            }
            drawBoxBirds();
        }

        function update() {
            if (isRunning) {
                enableGravity();
                pipeUpdater("pipeA");
                pipeUpdater("pipeB");
                pipeUpdater("pipeC");
                detectCollision(boxBirdX,boxBirdY,"pipeA");
                detectCollision(boxBirdX,boxBirdY,"pipeB");
                detectCollision(boxBirdX,boxBirdY,"pipeC");
                detectScore("pipeA");
                detectScore("pipeB");
                detectScore("pipeC");
            }
        }
        
        function draw() {
            ctx.clearRect(0,0,c.width,c.height);
            pipePair(holeSize,"pipeA");
            pipePair(holeSize,"pipeB");
            pipePair(holeSize,"pipeC");
            whiteBoard();
            if (!isFirstGame && !isReset) {
                boxBird(boxBirdX,boxBirdY, 40, 40, "black");
            }
        }
        
        function gameLoop() {
            reStart();
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

</script>
</body>
</html>
